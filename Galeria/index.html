<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Javier Rebull · Galería</title>
<meta name="description" content="Galería fotográfica de Javier Rebull — sesión 2026.">
<meta name="theme-color" content="#0e1013">
<link rel="icon" type="image/jpeg" href="../Images/profile.jpg">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Playfair+Display:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e1013;color:#e4e0d6;font-family:'DM Sans',sans-serif;min-height:100vh}
::selection{background:rgba(212,176,106,.35)}
.langs{position:fixed;top:14px;right:16px;z-index:50;display:flex;gap:4px;background:rgba(14,16,19,.7);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:5px 6px;backdrop-filter:blur(14px)}
.langs button{font-family:'DM Sans',sans-serif;background:transparent;border:none;color:#84878d;font-size:.72rem;font-weight:700;letter-spacing:1px;padding:6px 13px;border-radius:999px;cursor:pointer;transition:.2s;text-transform:uppercase}
.langs button:hover{color:#e4e0d6}
.langs button.active{background:#d4b06a;color:#14110a}
header{text-align:center;padding:64px 20px 36px}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,4vw,2.8rem);font-weight:800}
header p{color:#84878d;margin-top:8px;font-size:.9rem;font-weight:300;letter-spacing:.5px}
header a.back{display:inline-block;margin-top:18px;color:#d4b06a;text-decoration:none;font-size:.82rem;font-weight:600;letter-spacing:1px;border:1px solid rgba(212,176,106,.4);border-radius:999px;padding:8px 20px;transition:.2s;text-transform:uppercase}
header a.back:hover{background:rgba(212,176,106,.12)}
.grid{columns:4 280px;column-gap:14px;max-width:1280px;margin:0 auto;padding:0 18px 60px}
.ph{break-inside:avoid;margin-bottom:14px;border-radius:12px;overflow:hidden;cursor:zoom-in;background:#15181c}
.ph img{width:100%;display:block;transition:transform .35s ease}
.ph:hover img{transform:scale(1.025)}
.lb{position:fixed;inset:0;background:rgba(8,9,11,.96);display:none;align-items:center;justify-content:center;z-index:100}
.lb.open{display:flex}
.lb img{max-width:92vw;max-height:88vh;border-radius:10px;box-shadow:0 20px 80px rgba(0,0,0,.7)}
.lb button{position:fixed;background:none;border:none;color:#e4e0d6;font-size:2.2rem;cursor:pointer;padding:18px;opacity:.6;transition:opacity .15s;font-family:inherit}
.lb button:hover{opacity:1}
.lb .x{top:10px;right:16px}
.lb .prev{left:8px;top:50%;transform:translateY(-50%)}
.lb .next{right:8px;top:50%;transform:translateY(-50%)}
.lb .count{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:#84878d;font-size:.8rem;letter-spacing:1px}
footer{text-align:center;color:#5a5d63;font-size:.75rem;padding:0 0 40px;letter-spacing:1px}
</style></head><body>
<div class="langs">
  <button id="lang-en" onclick="setLang('en')">ENG</button>
  <button id="lang-es" onclick="setLang('es')">SPA</button>
  <button id="lang-zh" onclick="setLang('zh')">中文</button>
</div>
<header>
  <h1 id="t-title">Javier Rebull · Galería</h1>
  <p id="t-sub">Sesión fotográfica · 2026</p>
  <a class="back" id="t-back" href="/">← Volver al resume</a>
</header>

</div>
<footer>rebull.org</footer>
<div class="lb" id="lb" onclick="if(event.target===this)closeLb()">
  <button class="x" onclick="closeLb()" aria-label="Close">✕</button>
  <button class="prev" onclick="nav(-1);event.stopPropagation()" aria-label="Prev">‹</button>
  <img id="lbimg" src="" alt="Javier Rebull">
  <button class="next" onclick="nav(1);event.stopPropagation()" aria-label="Next">›</button>
  <div class="count" id="lbcount"></div>
</div>
<script>
const I18N = {
  en: {title:'Javier Rebull · Gallery',   sub:'Photo session · 2026', back:'← Back to resume',  doc:'Javier Rebull · Gallery'},
  es: {title:'Javier Rebull · Galería',   sub:'Sesión fotográfica · 2026', back:'← Volver al resume', doc:'Javier Rebull · Galería'},
  zh: {title:'Javier Rebull · 照片相册',  sub:'摄影写真 · 2026',      back:'← 返回简历',         doc:'Javier Rebull · 照片相册'}
};
function setLang(l){
  if(!I18N[l]) l='en';
  const t=I18N[l];
  document.getElementById('t-title').textContent=t.title;
  document.getElementById('t-sub').textContent=t.sub;
  document.getElementById('t-back').textContent=t.back;
  document.title=t.doc;
  document.documentElement.lang=l;
  document.querySelectorAll('.langs button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('lang-'+l); if(btn) btn.classList.add('active');
  localStorage.setItem('lang',l);
}
const PICS=['../Images/gallery/JavierRebull05808.jpg','../Images/gallery/JavierRebull058081.jpg','../Images/gallery/JavierRebull05812.jpg','../Images/gallery/JavierRebull058121.jpg','../Images/gallery/JavierRebull05812_evotobak.jpg','../Images/gallery/JavierRebull05838.jpg','../Images/gallery/JavierRebull058381.jpg','../Images/gallery/JavierRebull05846.jpg','../Images/gallery/JavierRebull058461.jpg','../Images/gallery/JavierRebull05854.jpg','../Images/gallery/JavierRebull058541.jpg','../Images/gallery/JavierRebull05858.jpg','../Images/gallery/JavierRebull058581.jpg','../Images/gallery/JavierRebull05890.jpg','../Images/gallery/JavierRebull058901.jpg','../Images/gallery/JavierRebull05907.jpg','../Images/gallery/JavierRebull059071.jpg','../Images/gallery/JavierRebull05919.jpg','../Images/gallery/JavierRebull059191.jpg','../Images/gallery/JavierRebull05934.jpg','../Images/gallery/JavierRebull059341.jpg'];
let cur=0;
function openLb(i){cur=i;render();document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden'}
function closeLb(){document.getElementById('lb').classList.remove('open');document.body.style.overflow=''}
function nav(d){cur=(cur+d+PICS.length)%PICS.length;render()}
function render(){document.getElementById('lbimg').src=PICS[cur];document.getElementById('lbcount').textContent=(cur+1)+' / '+PICS.length}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='Escape')closeLb();
  if(e.key==='ArrowLeft')nav(-1);
  if(e.key==='ArrowRight')nav(1);
});
setLang(localStorage.getItem('lang')||'en');
</script>
</body></html>
